# Self-contained single-host stack — a small VM (e.g. a free-tier EC2) behind a
# Cloudflare Tunnel, with the frontend served separately by Cloudflare Pages.
#
# Unlike docker-compose.prod.yml (an override on the dev stack), this file is
# standalone: only Postgres, Redis, the API, and the tunnel connector. No ports
# are published — cloudflared dials out to Cloudflare, so the box needs no inbound
# firewall openings and no TLS certs of its own. The analysis worker is omitted
# (server-side analysis falls back to the browser).
#
# Secrets come from a .env file next to this compose (NEVER committed). Required:
#   POSTGRES_PASSWORD   strong random string
#   JWT_SECRET          >= 32 chars, random
#   SMTP_PASS           Resend API key
#   TUNNEL_TOKEN        Cloudflare Tunnel connector token
# Optional (leave blank to keep the feature off):
#   GOOGLE_CLIENT_ID  GOOGLE_CLIENT_SECRET  SENTRY_DSN
#   ANTHROPIC_API_KEY (or AI_PROVIDER / AI_API_KEY / AI_MODEL / AI_BASE_URL)
#   Off-box backups to Cloudflare R2 — set ALL four to enable the backup-offsite
#   service: R2_BUCKET, R2_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY
#
# Bring up:  docker compose -f docker/docker-compose.host.yml up -d --build
# The API applies DB migrations on start.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ramsey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ramsey
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ramsey']
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [ramsey]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks: [ramsey]

  # Automated database backups: a scheduled pg_dump with rotation, written to a
  # volume on the box. Restore with: gunzip -c <dump>.sql.gz | docker compose
  # -f docker/docker-compose.host.yml exec -T postgres psql -U ramsey ramsey
  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ramsey
      POSTGRES_USER: ramsey
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: '7'
      BACKUP_KEEP_WEEKS: '4'
      BACKUP_KEEP_MONTHS: '3'
    volumes:
      - dbbackups:/backups
    networks: [ramsey]

  # Off-box copies of the backups to Cloudflare R2 (S3-compatible). Mirrors the
  # local dbbackups volume once a day. Idle (no-op) until the four R2_* vars are
  # set, so it never breaks a stack that doesn't use it.
  backup-offsite:
    image: rclone/rclone:latest
    restart: unless-stopped
    depends_on:
      - db-backup
    environment:
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      RCLONE_CONFIG_R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_BUCKET: ${R2_BUCKET:-}
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        if [ -z "$$R2_BUCKET" ]; then
          echo "R2 not configured; offsite backup idle"; sleep infinity
        fi
        while true; do
          rclone sync /data "r2:$$R2_BUCKET/db" --transfers 4 --s3-no-check-bucket || echo "rclone sync failed"
          sleep 86400
        done
    volumes:
      - dbbackups:/data:ro
    networks: [ramsey]

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://ramsey:${POSTGRES_PASSWORD:?}@postgres:5432/ramsey?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      CORS_ORIGIN: https://ramseytools.com
      FRONTEND_URL: https://ramseytools.com
      PUBLIC_API_URL: https://api.ramseytools.com
      # Ingress arrives from the cloudflared container on the docker bridge; trust
      # it so per-client rate limits key on Cloudflare's forwarded visitor IP.
      TRUST_PROXY: 172.16.0.0/12
      SMTP_HOST: smtp.resend.com
      SMTP_PORT: '465'
      SMTP_USER: resend
      SMTP_PASS: ${SMTP_PASS:?set SMTP_PASS in .env}
      SMTP_FROM: RAMSey <no-reply@mail.ramseytools.com>
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # AI chat. ANTHROPIC_API_KEY alone still works; set AI_PROVIDER/AI_API_KEY/
      # AI_MODEL instead to use an OpenAI-compatible endpoint. Leave all unset to
      # ship without AI — the tab hides itself. See docs/OPERATIONS.md.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      AI_PROVIDER_LABEL: ${AI_PROVIDER_LABEL:-}
      # One-var kill-switch: set to "false" (or 0/no/off) to turn AI chat off without removing keys.
      AI_CHAT_ENABLED: ${AI_CHAT_ENABLED:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    networks: [ramsey]

  # Outbound-only connector. In the Cloudflare Zero Trust tunnel config, add a
  # public hostname api.ramseytools.com -> http://backend:3000; Cloudflare then
  # creates the DNS record automatically.
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:?set TUNNEL_TOKEN in .env}
    depends_on:
      - backend
    networks: [ramsey]

networks:
  ramsey:
    driver: bridge

volumes:
  pgdata:
  dbbackups:
