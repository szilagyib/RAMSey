# Production overrides — use with:
#   docker compose --env-file docker/.env.prod \
#     -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# Secrets are injected from the environment (see docker/.env.prod.example).
# The ${VAR:?...} syntax makes `docker compose` fail fast if a secret is unset,
# so the insecure dev defaults from docker-compose.yml can never reach prod.

services:
  frontend:
    volumes: []
    restart: always

  backend:
    environment:
      DATABASE_URL: postgresql://ramsey:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ramsey?schema=public
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN is required (e.g. https://ramsey.example.com)}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required (e.g. https://ramsey.example.com)}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      NODE_ENV: production
    restart: always

  solver-worker:
    environment:
      DATABASE_URL: postgresql://ramsey:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/ramsey?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      NODE_ENV: production
    restart: always

  postgres:
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    restart: always

  redis:
    ports: []
    restart: always
