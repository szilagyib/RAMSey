<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 84" width="84" height="84">
  <!--
    RAMSey mark: a transition entering an absorbing state.

    The double circle is the notation for an absorbing state — the symbol a
    reliability engineer reads instantly, and the terminal state every Markov
    reliability model is built to reach. Two shapes and an arrow, on a solid
    ground: it still reads at 16px in a browser tab, where the old three-node
    graph on a 15%-tint ground turned to mush.
  -->
  <defs>
    <linearGradient id="ramsey-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <rect width="84" height="84" rx="19" fill="url(#ramsey-brand)" />

  <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Transition into the state -->
    <path d="M 11 42 H 22" fill="none" stroke-width="6" />
    <path d="M 22 34.5 L 32 42 L 22 49.5 Z" fill="#ffffff" stroke-width="2" />

    <!-- Absorbing state: outer ring + solid core -->
    <circle cx="55" cy="42" r="17.5" fill="none" stroke-width="6" />
    <circle cx="55" cy="42" r="7.5" fill="#ffffff" stroke="none" />
  </g>
</svg>
