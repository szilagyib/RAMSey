<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!--
    RAMSey lockup: the mark (see packages/frontend/public/favicon.svg) plus the
    wordmark. The mark is a transition entering an absorbing state — the double
    circle every Markov reliability model is built to reach.
  -->
  <defs>
    <linearGradient id="ramsey-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>

  <g transform="translate(16, 18)">
    <rect width="84" height="84" rx="19" fill="url(#ramsey-brand)" />

    <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 11 42 H 22" fill="none" stroke-width="6" />
      <path d="M 22 34.5 L 32 42 L 22 49.5 Z" fill="#ffffff" stroke-width="2" />
      <circle cx="55" cy="42" r="17.5" fill="none" stroke-width="6" />
      <circle cx="55" cy="42" r="7.5" fill="#ffffff" stroke="none" />
    </g>
  </g>

  <!-- Wordmark: the stem is the acronym, the suffix carries the brand colour. -->
  <text
    x="118"
    y="70"
    font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="46"
    font-weight="700"
    fill="#0f172a"
    letter-spacing="-1.5"
  >
    <tspan>RAMS</tspan><tspan fill="url(#ramsey-brand)" font-weight="500">ey</tspan>
  </text>

  <text
    x="120"
    y="92"
    font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="11"
    fill="#94a3b8"
    letter-spacing="2.6"
    font-weight="600"
  >
    RELIABILITY &#183; AVAILABILITY &#183; SAFETY
  </text>
</svg>
