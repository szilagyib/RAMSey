<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!--
    RAMSey lockup: the mark (packages/frontend/public/favicon.svg) plus the
    wordmark. Same mark, same gradient — the icon in the browser tab and the
    logo on the page are one thing, and both average to primary-600, the colour
    of the buttons.
  -->
  <defs>
    <linearGradient id="ramsey-brand" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4338ca" />
    </linearGradient>
  </defs>

  <g transform="translate(16, 18)">
    <rect width="84" height="84" rx="20" fill="url(#ramsey-brand)" />
    <circle cx="42" cy="42" r="24" fill="none" stroke="#ffffff" stroke-width="10" />
    <circle cx="42" cy="42" r="9.5" fill="#ffffff" />
  </g>

  <!-- Wordmark: the acronym in ink, the suffix in the brand colour. -->
  <text
    x="118"
    y="70"
    font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="46"
    font-weight="700"
    fill="#0f172a"
    letter-spacing="-1.5"
  >
    <tspan>RAMS</tspan><tspan fill="#4f46e5" font-weight="500">ey</tspan>
  </text>

  <text
    x="120"
    y="92"
    font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif"
    font-size="11"
    fill="#94a3b8"
    letter-spacing="2.6"
    font-weight="600"
  >
    RELIABILITY &#183; AVAILABILITY &#183; SAFETY
  </text>
</svg>
