name: Code Review
on: pull_request

jobs:
  gitagents:
    uses: szilagyib/GitAgents/.github/workflows/gitagents.yml@542e19c2dc0c224ef69729aee3e1d7843950d0cc
    with:
      provider: openai
      model: gpt-4.1-mini
    secrets:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
