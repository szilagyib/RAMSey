name: Deploy AWS

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.dockerignore'
      - '.github/workflows/deploy-aws.yml'
      - 'docker/backend/**'
      - 'infra/**'
      - 'packages/backend/**'
      - 'packages/engine/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.base.json'

concurrency:
  group: ramsey-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: CDK deploy
    if: vars.AWS_DEPLOY_ROLE_ARN != '' && vars.AWS_CERTIFICATE_ARN != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure short-lived AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-central-1

      - name: Deploy production stack
        run: >-
          npm run infra:deploy --
          --require-approval never
          --parameters CertificateArn=${{ vars.AWS_CERTIFICATE_ARN }}
